<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 564 96" width="564" height="96" fill="none">
  <title>database/backup — horizontal lockup</title>
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@500&amp;display=swap');
      .wm { font-family: 'Azeret Mono', ui-monospace, monospace; font-weight: 500; font-size: 56px; letter-spacing: -2.2px; }
      .wm-ink { fill: #13110F; }
      .wm-sep { fill: #B8451F; }
    </style>
  </defs>
  <!-- mark -->
  <g transform="translate(0, 16)">
    <rect x="3" y="3" width="58" height="58" rx="11" stroke="#13110F" stroke-width="2.5"/>
    <rect x="14" y="20" width="32" height="6" rx="2" fill="#13110F"/>
    <rect x="14" y="29" width="36" height="6" rx="2" fill="#13110F"/>
    <rect x="14" y="38" width="28" height="6" rx="2" fill="#13110F"/>
    <circle cx="50" cy="14" r="3.4" fill="#B8451F"/>
  </g>
  <!-- wordmark · textLength fixe la largeur quel que soit le rendu de la fonte -->
  <text x="88" y="68" class="wm wm-ink" textLength="472" lengthAdjust="spacingAndGlyphs">database<tspan class="wm-sep">/</tspan>backup</text>
</svg>
