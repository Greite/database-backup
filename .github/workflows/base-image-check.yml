name: Rebuild on Base Image Update

on:
  schedule:
    # Run 4 times daily at 00:00, 06:00, 12:00, and 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-and-rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check if base image was updated
        id: check
        uses: lucacome/docker-image-update-checker@v2
        with:
          base-image: debian:trixie-slim
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64,linux/arm64

      - name: Checkout repository
        if: steps.check.outputs.needs-updating == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.needs-updating == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.needs-updating == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        if: steps.check.outputs.needs-updating == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.check.outputs.needs-updating == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.needs-updating }}" == "true" ]; then
            echo "### Image rebuilt" >> "$GITHUB_SUMMARY"
            echo "Base image \`debian:trixie-slim\` was updated." >> "$GITHUB_SUMMARY"
          else
            echo "### No rebuild needed" >> "$GITHUB_SUMMARY"
            echo "Base image \`debian:trixie-slim\` is unchanged." >> "$GITHUB_SUMMARY"
          fi
