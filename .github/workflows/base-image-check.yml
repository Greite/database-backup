name: Rebuild on Base Image Update

on:
  schedule:
    # Run 4 times daily at 00:00, 06:00, 12:00, and 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BASE_IMAGE: debian:trixie-slim

jobs:
  check-and-rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if base image was updated
        id: check
        run: |
          # Pull latest base image and get its digest
          docker pull ${{ env.BASE_IMAGE }}
          BASE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.BASE_IMAGE }})
          echo "base_digest=$BASE_DIGEST" >> "$GITHUB_OUTPUT"

          # Try to get the digest stored in our last build
          STORED_DIGEST=""
          if docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest 2>/dev/null; then
            STORED_DIGEST=$(docker inspect --format='{{index .Config.Labels "base.image.digest"}}' ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest 2>/dev/null || echo "")
          fi
          echo "stored_digest=$STORED_DIGEST" >> "$GITHUB_OUTPUT"

          if [ "$BASE_DIGEST" != "$STORED_DIGEST" ] || [ -z "$STORED_DIGEST" ]; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            echo "Base image changed: rebuilding"
          else
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
            echo "Base image unchanged: skipping rebuild"
          fi

      - name: Extract metadata (tags, labels)
        if: steps.check.outputs.rebuild == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            base.image.digest=${{ steps.check.outputs.base_digest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.rebuild }}" == "true" ]; then
            echo "### ✅ Image rebuilt" >> "$GITHUB_SUMMARY"
            echo "Base image digest: \`${{ steps.check.outputs.base_digest }}\`" >> "$GITHUB_SUMMARY"
          else
            echo "### ⏭️ No rebuild needed" >> "$GITHUB_SUMMARY"
            echo "Base image digest unchanged: \`${{ steps.check.outputs.base_digest }}\`" >> "$GITHUB_SUMMARY"
          fi
